apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smart-campus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Smart-Campus-Digital-Twin/Smart-Campus-Digital-Twin-v4.git
    targetRevision: master
    path: deployment/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: campus
  revisionHistoryLimit: 5
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
  ignoreDifferences:
    # Secrets are managed by deployment/k8s/apply-secrets.sh, not by ArgoCD.
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
        - /stringData
