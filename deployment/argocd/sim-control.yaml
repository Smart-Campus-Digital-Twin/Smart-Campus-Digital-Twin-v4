apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sim-control
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Smart-Campus-Digital-Twin/Smart-Campus-Digital-Twin-v4.git
    targetRevision: master
    path: services/sim-control/deployment/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: campus
  revisionHistoryLimit: 5
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
