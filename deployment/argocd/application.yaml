apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smart-campus
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Smart-Campus-Digital-Twin/Smart-Campus-Digital-Twin-v4.git
    targetRevision: v4
    path: deployment/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: campus

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m

  revisionHistoryLimit: 5
