apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smart-campus-simulator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Smart-Campus-Digital-Twin/Smart-Campus-Digital-Twin-v4.git
    targetRevision: v4
    path: deployment/k8s-simulator

  destination:
    server: https://kubernetes.default.svc
    namespace: campus

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
