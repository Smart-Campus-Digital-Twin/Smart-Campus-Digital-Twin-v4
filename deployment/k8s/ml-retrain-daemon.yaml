apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-retrain-daemon
  namespace: campus
  labels:
    app: ml-retrain-daemon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-retrain-daemon
  template:
    metadata:
      labels:
        app: ml-retrain-daemon
    spec:
      containers:
        - name: ml-retrain-daemon
          image: ghcr.io/smart-campus-digital-twin/smart-campus-digital-twin-v4/ml-retrain:latest
          imagePullPolicy: Always
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
            - name: INFLUXDB_URL
              value: "http://influxdb:8086"
            - name: INFLUXDB_ORG
              value: "smart-campus"
            - name: INFLUXDB_BUCKET_SENSORS
              value: "campus_sensors"
            - name: INFLUXDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: campus-influxdb
                  key: INFLUXDB_TOKEN
                  optional: true
            - name: TRAIN_DAYS
              value: "90"
            - name: DATASETS_DIR
              value: "/app/datasets"
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 2Gi
              cpu: 2
