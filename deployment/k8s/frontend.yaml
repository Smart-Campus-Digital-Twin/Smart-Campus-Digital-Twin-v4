apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: campus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/smart-campus-digital-twin/smart-campus-digital-twin-v4/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: /api
            - name: NEXT_PUBLIC_KEYCLOAK_URL
              value: /auth
            - name: NEXT_PUBLIC_KEYCLOAK_REALM
              value: campus
            - name: NEXT_PUBLIC_KEYCLOAK_CLIENT_ID
              value: campus-frontend
            - name: NODE_ENV
              value: production
          resources:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 128Mi
              cpu: 100m
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: campus
spec:
  selector:
    app: frontend
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
