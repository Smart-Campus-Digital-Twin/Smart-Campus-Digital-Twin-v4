apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-prediction
  namespace: campus
  labels:
    app: ml-prediction
spec:
  progressDeadlineSeconds: 1800
  replicas: 0
  selector:
    matchLabels:
      app: ml-prediction
  template:
    metadata:
      labels:
        app: ml-prediction
    spec:
      containers:
        - name: ml-prediction
          image: ghcr.io/smart-campus-digital-twin/smart-campus-digital-twin-v4/ml-prediction:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
            - name: INFLUXDB_URL
              value: "http://influxdb:8086"
            - name: INFLUXDB_ORG
              value: "smart-campus"
            - name: INFLUXDB_BUCKET
              value: "campus_predictions"
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 500m
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 0
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 0
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ml-prediction
  namespace: campus
spec:
  selector:
    app: ml-prediction
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
