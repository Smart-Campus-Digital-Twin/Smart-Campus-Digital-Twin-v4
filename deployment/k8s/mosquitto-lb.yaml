apiVersion: v1
kind: Service
metadata:
  name: mosquitto-lb
  namespace: campus
  annotations:
    service.beta.kubernetes.io/do-loadbalancer-protocol: "tcp"
spec:
  type: LoadBalancer
  selector:
    app: mosquitto
  ports:
    - name: mqtts
      port: 8883
      targetPort: 8883
      protocol: TCP