apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: campus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/smart-campus-digital-twin/smart-campus-digital-twin-v4/api:latest
          imagePullPolicy: Always
          args: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: api-env
            - secretRef:
                name: postgres-env
            - secretRef:
                name: influxdb-env
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: INFLUXDB_URL
              value: http://influxdb:8086
            - name: INFLUXDB_ORG
              value: smart-campus
            - name: INFLUXDB_BUCKET_RAW
              value: campus_sensors
            - name: INFLUXDB_BUCKET_1M
              value: campus_1m
            - name: INFLUXDB_BUCKET_1H
              value: campus_1h
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 256Mi
              cpu: 200m
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: campus
spec:
  selector:
    app: api
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
