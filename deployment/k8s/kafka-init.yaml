apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-init
  namespace: campus
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: apache/kafka:3.7.1
          command:
            - sh
            - -c
            - |
              until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list; do
                echo "Waiting for Kafka..."; sleep 5
              done
      containers:
        - name: kafka-init
          image: apache/kafka:3.7.1
          env:
            - name: KAFKA_RETENTION_MS
              valueFrom:
                configMapKeyRef:
                  name: campus-common
                  key: KAFKA_RETENTION_MS
            - name: KAFKA_PARTITIONS
              valueFrom:
                configMapKeyRef:
                  name: campus-common
                  key: KAFKA_PARTITIONS
          command:
            - /bin/bash
            - -c
            - |
              set -e
              BS=kafka:9092
              create() {
                /opt/kafka/bin/kafka-topics.sh --bootstrap-server $BS --create --if-not-exists \
                  --topic "$1" --partitions "$2" --replication-factor 1 \
                  --config retention.ms=$KAFKA_RETENTION_MS
              }
              create sensors.temperature  $KAFKA_PARTITIONS
              create sensors.occupancy    $KAFKA_PARTITIONS
              create sensors.energy       $KAFKA_PARTITIONS
              create sensors.aggregated   $KAFKA_PARTITIONS
              create sensors.dlq          1
              create alerts.anomalies     1
              echo "All Kafka topics created."
