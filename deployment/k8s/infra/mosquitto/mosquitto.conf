# Mosquitto broker configuration — Smart Campus Digital Twin
#
# Authentication: username/password file.
# Run `mosquitto_passwd -c /mosquitto/config/passwd <username>` to create the file,
# or let the Docker entrypoint script generate it from MQTT_USERNAME / MQTT_PASSWORD.

# --- Networking ---
listener 1883
protocol mqtt

# --- Authentication ---
allow_anonymous false
password_file /mosquitto/data/passwd

# --- Persistence ---
persistence true
persistence_location /mosquitto/data/

# --- Logging ---
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# --- QoS / inflight ---
# Keep a modest message queue so sensors can reconnect without losing data.
max_queued_messages 1000
max_inflight_messages 20


