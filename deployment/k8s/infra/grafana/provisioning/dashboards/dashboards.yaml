# Grafana dashboard provisioning — loads JSON files from /var/lib/grafana/dashboards

apiVersion: 1

providers:
  - name: Smart Campus
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
