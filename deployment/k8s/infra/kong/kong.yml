_format_version: "3.0"
_transform: true

services:
  - name: campus-api
    url: http://api:8000
    connect_timeout: 10000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: api-all
        paths:
          - "/"
        strip_path: false

  - name: grafana-svc
    url: http://grafana:3000
    routes:
      - name: grafana-ui
        paths:
          - "/grafana"
        strip_path: true

  - name: flink-ui
    url: http://flink-jobmanager:8081
    routes:
      - name: flink-web-ui
        paths:
          - "/flink"
        strip_path: true

plugins:
  - name: rate-limiting
    config:
      minute: 600
      policy: local
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - Accept
      max_age: 3600
