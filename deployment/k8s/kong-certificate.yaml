apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: letsencrypt-prod
  namespace: campus
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: bitbrigadeteam@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            serviceType: ClusterIP
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kong-tls
  namespace: campus
spec:
  secretName: kong-tls
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: letsencrypt-prod
    kind: Issuer
  commonName: campus.165-245-144-106.nip.io
  dnsNames:
    - campus.165-245-144-106.nip.io
