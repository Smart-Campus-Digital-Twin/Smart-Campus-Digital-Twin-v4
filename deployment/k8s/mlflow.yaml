apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-data
  namespace: campus
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: campus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.15.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --quiet psycopg2-binary &&
              mlflow server --host=0.0.0.0 --port=5000 \
                --backend-store-uri=postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/mlflow \
                --artifacts-destination=/mlflow/artifacts \
                --default-artifact-root=mlflow-artifacts:/ \
                --serve-artifacts
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: campus-postgres
          volumeMounts:
            - name: data
              mountPath: /mlflow/artifacts
          resources:
            requests:
              memory: 512Mi
              cpu: 100m
            limits:
              memory: 1500Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mlflow-data
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: campus
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
