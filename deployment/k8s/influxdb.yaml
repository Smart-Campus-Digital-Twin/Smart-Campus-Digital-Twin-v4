apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: influxdb-data
  namespace: campus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: influxdb
  namespace: campus
spec:
  serviceName: influxdb
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      containers:
        - name: influxdb
          image: influxdb:2.7
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: campus-common
            - secretRef:
                name: campus-influxdb
            - secretRef:
                name: influxdb-env
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /ping
              port: 8086
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: influxdb-data
              mountPath: /var/lib/influxdb2
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: influxdb-data
          persistentVolumeClaim:
            claimName: influxdb-data
        - name: init-scripts
          configMap:
            name: influxdb-init-scripts
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: campus
spec:
  selector:
    app: influxdb
  type: LoadBalancer
  ports:
    - port: 8086
      targetPort: 8086
