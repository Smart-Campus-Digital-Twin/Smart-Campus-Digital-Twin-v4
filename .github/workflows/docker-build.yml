name: Build & Push Docker Images

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master, main, v4]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  # ── Detect which services have changed files ────────────────────────────────
  changes:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      any-changed: ${{ steps.set-matrix.outputs.any-changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/api/**'
              - 'shared/**'
            simulator:
              - 'services/simulator/**'
              - 'shared/**'
            frontend:
              - 'services/frontend/**'
            ml-consumer:
              - 'services/ml-consumer/consumer/**'
              - 'shared/**'
            ml-prediction:
              - 'services/ml-prediction/**'
              - 'shared/**'
            ml-retrain:
              - 'services/ml-retrain/**'
              - 'services/ml-prediction/datasets/**'
              - 'shared/**'
            sim-control-backend:
              - 'services/sim-control/backend/**'
              - 'shared/**'
            sim-control-frontend:
              - 'services/sim-control/frontend/**'

      - name: Build filtered matrix
        id: set-matrix
        env:
          CHANGES: ${{ steps.filter.outputs.changes }}
          EVENT:   ${{ github.event_name }}
        run: |
          ALL='[
            {"service":"api","dockerfile":"services/api/Dockerfile","context":"."},
            {"service":"simulator","dockerfile":"services/simulator/Dockerfile","context":"."},
            {"service":"frontend","dockerfile":"services/frontend/Dockerfile","context":"services/frontend"},
            {"service":"ml-consumer","dockerfile":"services/ml-consumer/consumer/Dockerfile","context":"."},
            {"service":"ml-prediction","dockerfile":"services/ml-prediction/Dockerfile","context":"."},
            {"service":"ml-retrain","dockerfile":"services/ml-retrain/Dockerfile","context":"."},
            {"service":"sim-control-backend","dockerfile":"services/sim-control/backend/Dockerfile","context":"."},
            {"service":"sim-control-frontend","dockerfile":"services/sim-control/frontend/Dockerfile","context":"services/sim-control/frontend","build_args":"NEXT_PUBLIC_API_URL=https://sim-control.168-144-48-147.nip.io"}
          ]'

          REF="${{ github.ref }}"
          if [ "$EVENT" = "workflow_dispatch" ] \
             || [ "$REF" = "refs/heads/main" ] \
             || [ "$REF" = "refs/heads/master" ] \
             || [ "$REF" = "refs/heads/v4" ]; then
            FILTERED=$(echo "$ALL" | jq -c '.')
          else
            FILTERED=$(echo "$ALL" | jq -c --argjson c "$CHANGES" \
              '[.[] | select(.service as $s | $c | index($s) != null)]')
          fi

          ANY=$(echo "$FILTERED" | jq 'length > 0')

          {
            echo "matrix<<EOF"
            echo "{\"include\":$FILTERED}"
            echo "EOF"
            echo "any-changed=$ANY"
          } >> "$GITHUB_OUTPUT"

  # ── Build + push only changed images ───────────────────────────────────────
  build-push:
    needs: changes
    if: needs.changes.outputs.any-changed == 'true'
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_ADMIN_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/v4' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: ${{ matrix.build_args }}
          provenance: false

  # ── Make pushed images public ──────────────────────────────────────────────
  make-public:
    needs: [changes, build-push]
    if: github.event_name != 'pull_request'
    name: Public ${{ matrix.service }}
    runs-on: ubuntu-22.04
    permissions:
      packages: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}

    steps:
      - name: Make package public (best-effort)
        env:
          GH_TOKEN: ${{ secrets.GHCR_ADMIN_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          SERVICE: ${{ matrix.service }}
        run: |
          PKG="${REPO}%2F${SERVICE}"
          echo "Setting visibility=public for package ${OWNER}/${PKG}"

          # Try org endpoint first
          if gh api --method PATCH \
              "/orgs/${OWNER}/packages/container/${PKG}/visibility" \
              -f visibility=public 2>/tmp/err; then
            echo "OK via /orgs/"
            exit 0
          fi

          # Fall back to user endpoint
          if gh api --method PATCH \
              "/users/${OWNER}/packages/container/${PKG}/visibility" \
              -f visibility=public 2>/tmp/err; then
            echo "OK via /users/"
            exit 0
          fi

          echo "::warning::Could not set visibility=public for ${OWNER}/${PKG}. Last error:"
          cat /tmp/err || true
          echo "::warning::Set visibility manually in GHCR UI, or grant the token admin:packages scope."
          exit 0
