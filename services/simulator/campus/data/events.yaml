# Campus event definitions.
# Edit names, venues, probabilities, months, and day ranges freely.
# The generation logic (seeding, scheduling rules) lives in events.py.
# Venue IDs must match building IDs in topology.py.

padura:
  start_hour: 18.0
  end_hour: 22.0
  venue: lagaan
  fill_range: [0.55, 0.90]
  sem1_doy_range: [135, 191]   # May 15 – Jul 10
  sem2_doy_range: [324, 364]   # Nov 20 – Dec 30
  departments:
    - {name: "Computer Science",        building: "sumanadasa",    padura_venue: "sumanadasa"}
    - {name: "Information Technology",  building: "faculty-it"}
    - {name: "Civil Engineering",        building: "dept-civil"}
    - {name: "Electronics & Telecom",   building: "dept-ete",      padura_venue: "dept-ete"}
    - {name: "Textile & Clothing",      building: "dept-textile"}
    - {name: "Transport & Logistics",   building: "dept-transport"}
    - {name: "Material Science",        building: "dept-material"}
    - {name: "Chemical Engineering",    building: "dept-chemical",  padura_venue: "dept-chemical"}
    - {name: "Mechanical Engineering",  building: "dept-mechanical"}
    - {name: "Business Science",        building: "faculty-business"}
    - {name: "Medicine Faculty",        building: "faculty-medicine"}

food_festival:
  months: [3, 9, 11]
  day_range: [1, 28]
  probability: 0.65
  start_hour: 10.0
  end_hour: 20.0
  venue_fill:
    lagaan: [0.45, 0.80]
    sentra-court: [0.80, 0.98]
  names:
    - "Cultural Food Festival"
    - "Campus Street Food Carnival"


