apiVersion: v1
kind: ConfigMap
metadata:
  name: sim-control-config
  namespace: campus
data:
  MQTT_HOST: "139.59.194.248"
  MQTT_PORT: "1883"
  PUBLISH_INTERVAL_S: "5.0"
  LOG_LEVEL: "INFO"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sim-control-backend
  namespace: campus
  labels:
    app: sim-control-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sim-control-backend
  template:
    metadata:
      labels:
        app: sim-control-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/smart-campus-digital-twin/smart-campus-digital-twin-v4/sim-control-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: sim-control-config
            - secretRef:
                name: campus-mqtt
                optional: true
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 150m
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: sim-control-backend
  namespace: campus
spec:
  selector:
    app: sim-control-backend
  ports:
    - port: 8000
      targetPort: 8000
      name: http
