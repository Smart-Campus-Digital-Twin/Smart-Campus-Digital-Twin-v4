apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sim-control-tls
  namespace: campus
spec:
  secretName: sim-control-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: sim-control.168-144-48-147.nip.io
  dnsNames:
    - sim-control.168-144-48-147.nip.io
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sim-control-frontend
  namespace: campus
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - sim-control.168-144-48-147.nip.io
      secretName: sim-control-tls
  rules:
    - host: sim-control.168-144-48-147.nip.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sim-control-backend
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: sim-control-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sim-control-frontend
                port:
                  number: 3001
