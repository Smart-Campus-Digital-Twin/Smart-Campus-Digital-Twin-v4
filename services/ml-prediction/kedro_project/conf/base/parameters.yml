# ── Train/test split ──────────────────────────────────────────────────────────
# Train on 2024, test on 2025 — time-aware, no leakage.
train_cutoff_date: "2025-01-01"

# ── XGBoost hyperparameters ───────────────────────────────────────────────────
xgb_params:
  n_estimators: 400
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1

# ── Lag / rolling-window feature settings ────────────────────────────────────
# Number of prior windows to include as lag features (30-min slots for
# congestion, hours for energy).
congestion_lags: [1, 2, 4, 8, 48]   # 30 min, 1 h, 2 h, 4 h, same-slot yesterday
energy_lags:     [1, 2, 24, 168]    # 1 h, 2 h, same-hour yesterday, same-hour last week
rolling_windows: [3, 6]             # rolling mean/std over these many windows

# ── MLflow ───────────────────────────────────────────────────────────────────
mlflow_tracking_uri: "http://mlflow:5000"
mlflow_experiment_canteen: "campus_canteen_congestion"
mlflow_experiment_library: "campus_library_congestion"
mlflow_experiment_energy:  "campus_energy_forecast"
