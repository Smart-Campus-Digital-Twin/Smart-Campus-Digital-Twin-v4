[tool.pytest.ini_options]
# Run from the repo root: pytest tests/
testpaths    = ["tests"]
pythonpath   = ["."]       # adds repo root to sys.path so `from shared.schemas import ...` works
asyncio_mode = "auto"      # pytest-asyncio: all async tests run without @pytest.mark.asyncio
addopts      = "-ra -q --tb=short"

[tool.ruff]
line-length = 100
target-version = "py312"
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = [
    "E501",   # line too long — handled by formatter
    "B008",   # do not perform function calls in default args (pydantic Field pattern)
]
exclude = ["venv", ".venv", "__pycache__", "*.pyc"]
